<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨‍🍳</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <!-- סרטון רקע -->
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="/static/images/8581280-hd_1920_1080_30fps.mp4" type="video/mp4">
    </video>
    <div id="bg-overlay"></div>

    <h1>Find a recipe <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: bottom; margin-left: 5px;"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"></path><line x1="6" y1="17" x2="18" y2="17"></line></svg></h1>
    
    <button id="open-login-homepage">Login/Register <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; margin-left: 5px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></button>
    <button id="menu-button">☰</button>

    <!-- שורת חיפוש אחידה: [תיבת טקסט עם זכוכית מגדלת] + מצלמה מימין -->
    <div class="search-container">
        <div class="search-bar">
            <input id="search-input" type="text" placeholder="Search for a recipe...">
            <button id="search-button" title="Search recipes"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
        </div>
        <button id="snap-btn" title="📸 Snap an ingredient to search!"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg></button>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">
    </div>

    <div id="chip-container"></div>

    <div id="sidebar" class="sidebar">
        <button id="close-sidebar" class="sidebar-close-x">✕</button>
        <h3 id="user-greeting" class="sidebar-greeting"></h3>

        <div class="sidebar-section">
            <span class="sidebar-section-label">NAVIGATION</span>
            <button id="home-btn" class="sidebar-nav-btn">Home 🏠</button>
            <button id="favorites-list-btn" class="sidebar-nav-btn">My Favorites ❤️</button>
        </div>

        <div class="sidebar-section">
            <span class="sidebar-section-label">CUISINE</span>
            <select id="cuisine-select">
                <option value="">All Cuisines</option>
                <option value="american">American</option>
                <option value="asian">Asian</option>
                <option value="french">French</option>
                <option value="indian">Indian</option>
                <option value="italian">Italian</option>
                <option value="mediterranean">Mediterranean</option>
                <option value="mexican">Mexican</option>
            </select>
        </div>

        <div class="sidebar-section">
            <span class="sidebar-section-label">DIETARY</span>
            <div id="allergies-container">
                <div class="checkbox-row">
                    <input type="checkbox" id="vegan-check" value="vegan">
                    <label for="vegan-check">Vegan</label>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="gluten-check" value="gluten-free">
                    <label for="gluten-check">Gluten-Free</label>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="peanut-check" value="peanut-free">
                    <label for="peanut-check">Peanut-Free</label>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="vegetarian-check" value="vegetarian">
                    <label for="vegetarian-check">Vegetarian</label>
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <span class="sidebar-section-label">SETTINGS</span>
            <div class="toggle-row">
                <span class="toggle-label">Dark Mode 🌙</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <button id="logout-btn" class="sidebar-nav-btn sidebar-logout">Logout 🚪</button>
        </div>
    </div>

    <div id="search-message"></div>

    <div id="recommendations" class="recommendations-container">
        <h2>Recommended Recipes ✨:</h2>
        <div id="recommendations-grid"></div>
    </div>

    <div id="results"></div>

    <!-- מודאלים -->
    <div id="login-modal" class="modal-overlay">
        <div class="login-box">
            <button id="close-modal-btn" class="modal-close-x">✕</button>
            <h2>Sign in:</h2>
            <input type="text" id="username-input" placeholder="Username">
            <input type="password" id="password-input" placeholder="Password">
            <button id="login-btn">Login</button>
            <button id="register-btn">Register</button>
        </div>
    </div>

    <div id="favorites-modal" class="modal-overlay">
        <div class="favorites-box">
            <button id="close-favorites-btn" class="modal-close-x">✕</button>
            <h2>My Favorites:</h2>
            <div id="favorites-grid"></div>
        </div>
    </div>

    <div id="register-section" class="register-section modal-overlay">
        <div class="register-box">
            <button id="close-register-btn" class="modal-close-x">✕</button>
            <h2>New register:</h2>
            <input type="text" id="register-username-input" placeholder="New Username">
            <input type="password" id="register-password-input" placeholder="New Password">
            <input type="password" id="register-confirm-password-input" placeholder="confirm Password">
            <button id="confirm-register-btn">Submit</button>
        </div>
    </div>

    <div id="custom-alert-modal" class="modal-overlay">
        <div class="custom-alert-box">
            <p id="custom-alert-text">Message goes here</p>
            <button id="close-alert-btn">Got it! 👍</button>
        </div>
    </div>

    <script type="module" src="/static/js/main.js"></script>

    <footer class="footer">
        Built with ❤️ by Yehonatan Cohen
    </footer>
</body>
</html>
